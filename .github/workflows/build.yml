name: Build Releases

on:
  push:
    branches: [main, beta]
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # Windows ships only the Inno Setup installer
            # (JustATuner-Windows-Setup-{version}.exe), uploaded by its
            # own dedicated step.
          - os: macos-latest
            artifact_name: JustATuner.app
            asset_name: JustATuner-macOS.zip
          - os: ubuntu-latest
            artifact_name: JustATuner
            asset_name: JustATuner-Linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install system libraries (Linux)
        if: matrix.os == 'ubuntu-latest'
        # libportaudio2: sounddevice runtime. libx11-dev: wgpu links -lX11
        # at build time, so the GPU renderer crate needs it to link.
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 libx11-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # GPU strobe tuner renderer (Rust/wgpu via pyo3 + maturin). Built on
      # Windows and Linux; build.py's capability check bundles it, and
      # tuner/view.py falls back to the canvas renderer at runtime if it's
      # somehow missing. Not built on macOS: Tk Aqua's winfo_id() is not
      # an NSView, so wgpu can't attach a surface there — Macs are
      # canvas-only by design (see tuner/view.py).
      - name: Install Rust toolchain
        if: matrix.os != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Build GPU tuner renderer (Rust/wgpu)
        if: matrix.os != 'macos-latest'
        run: |
          pip install maturin
          python -m maturin build --release --manifest-path tuner_renderer/Cargo.toml
          pip install --find-links tuner_renderer/target/wheels tuner_render

      - name: Build with PyInstaller
        run: python build.py

      - name: Verify microphone permission in Info.plist (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          plutil -extract NSMicrophoneUsageDescription raw \
            dist/JustATuner.app/Contents/Info.plist
          echo "NSMicrophoneUsageDescription present in bundle."

      # ---------- Windows installer (Inno Setup) ----------
      - name: Extract APP_VERSION from config.py
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $content = Get-Content config.py -Raw
          if ($content -match 'APP_VERSION\s*=\s*"([^"]+)"') {
            $ver = $Matches[1]
            "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            Write-Host "APP_VERSION=$ver"
          } else {
            Write-Error "Could not find APP_VERSION in config.py"
            exit 1
          }

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DAppVersion=$env:APP_VERSION" installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ---------- Rename / package per-platform artifacts ----------
      - name: Rename Linux artifact
        if: matrix.os == 'ubuntu-latest'
        run: mv dist/JustATuner dist/JustATuner-Linux

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r ${{ matrix.asset_name }} JustATuner.app

      # ---------- Workflow-run artifacts ----------
      - name: Upload artifact (Linux/macOS)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v6
        with:
          name: JustATuner-Windows-Setup
          path: dist/JustATuner-Windows-Setup-*.exe

      # ---------- Attach to GitHub Release ----------
      - name: Upload to Release (Linux/macOS)
        if: matrix.os != 'windows-latest' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer to Release
        if: matrix.os == 'windows-latest' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/JustATuner-Windows-Setup-*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
